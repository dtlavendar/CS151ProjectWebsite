<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Everything goes within this table. See EpilogJS examples -->
    <center>
        <table width="800" cellspacing="0" cellpadding="0" bgcolor="#ffffff" class="main-table">
            <tr>
                <td>
                    <table width="800" height="100" cellspacing="0" cellpadding="0">
                        <tr>
                            <td align="center" valign="center">
                                <span style="font-size:36px">Elevator Game</span><br/>
                                <span>Move everyone to their destination in as few unit trips as possible.</span>
                            </td>
                        </tr>
                    </table>

                    <!-- ======================================================================
                         New simple elevator drawing area
                         ====================================================================== -->
                    <center>
                        <br/>
                        <table width="640" cellpadding="8" cellspacing="0" bgcolor="#f4f8f8" border="1">
                            <tr>
                                <td align="center">
                                    <div id="game-status" class="game-status">
                                        Moves: <span id="move-count">0</span><br/>
                                        <span id="status-message"> Click "Start Puzzle" to begin. </span>
                                    </div>
                                    <div id="building" class="building">
                                        <canvas id="floor-canvas" width="600" height="280"></canvas>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </center>

                    <div class="controls">
                        <button type="button" id="btn-start-puzzle">Start Puzzle</button>
                        <button type="button" id="btn-move-up">Move Up</button>
                        <button type="button" id="btn-move-down">Move Down</button>
                    </div>

                    <div id="passenger-actions" class="controls">
                        <label for = "board-action">Person:</label>
                        <select id = "board-action"></select>
                        <button type = "button" id = "board-button">Board</button>

                        <label for = "drop-action">Person:</label>
                        <select id = "drop-action"></select>
                        <button type = "button" id = "drop-button">Drop</button>
                    </div>

                    <!-- ======================================================================
                         New bottom settings area
                         ====================================================================== -->
                    <div class="table-settings">
                        <div class="slidecontainer">
                            <h3>Floors</h3>
                            <p id="floor-count-label">4</p>
                            <input type="range" min="2" max="10" value="4" class="slider" id="floor-count" oninput="setValue()">
                        </div>

                        <div class="slidecontainer">
                            <h3>Capacity</h3>
                            <p id="capacity-label">2</p>
                            <input type="range" min="1" max="5" value="2" class="slider" id="capacity" oninput="setValue()">
                        </div>

                        <div class="slidecontainer">
                            <h3>People</h3>
                            <p id="person-count-label">3</p>
                            <input type="range" min="1" max="10" value="3" class="slider" id="person-count" oninput="setValue()">
                        </div>
                    </div>

                </td>
            </tr>
        </table>
    </center>

</body>

<script src="epilog-scripts/epilog.js"></script>
<script src="script.js"></script>

</html>
